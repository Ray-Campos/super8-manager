<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super 8 | Rodadas</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <header class="app-header">
        <h1 id="header-title">Carregando Torneio...</h1>
        <a href="tournament.html" style="color: white; text-decoration: none; font-weight: bold;">Voltar</a>
    </header>

    <main class="container">
        
        <nav class="round-tabs" id="round-nav-tabs"></nav>

        <div class="dashboard-header" style="text-align: left; margin-bottom: 1.5rem;">
            <h2 id="current-round-title">Rodada 1</h2>
            <p id="current-round-status">Preencha os resultados para avançar.</p>
        </div>

        <div id="intermission-container" style="display: none; margin-bottom: 2rem;">
            <div class="table-responsive" style="margin-bottom: 1.5rem;">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Atleta</th>
                            <th>V</th>
                            <th>D</th>
                            <th>GP</th>
                            <th>GC</th>
                            <th>Pts</th>
                        </tr>
                    </thead>
                    <tbody id="intermission-table-body">
                        </tbody>
                </table>
            </div>
            <button id="btn-start-next-round" class="btn-success" style="padding: 1rem; font-size: 1.2rem; width: 100%;">
                Iniciar Rodada <span id="next-round-label"></span>
            </button>
        </div>

        <div id="matches-container" style="display: flex; flex-direction: column; gap: 1.5rem;"></div>

        <div style="margin-top: 2rem;">
            <button id="btn-save-round" class="btn-primary" style="padding: 1rem; font-size: 1.2rem;">Salvar Rodada e Avançar</button>
        </div>

    </main>

    <footer class="footer">
        <p>&copy; - Super 8 Manager</p>
        <a href="https://github.com/Ray-Campos" target="_blank" rel="noopener noreferrer" class="footer-github">GitHub</a>
    </footer>

    <script src="../assets/js/active-tournament.js"></script>
</body>
</html>
